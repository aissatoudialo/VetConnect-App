<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>VetConnect - Ajouter une Clinique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar (On garde la même que les autres pages) -->
        <nav class="col-md-2 sidebar shadow">
            <div class="text-center mb-4">
                <h4 class="fw-bold">VetConnect</h4>
                <small>Espace Admin</small>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="tableauBord.html"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="Gestion_clinique.html"><i class="fas fa-hospital me-2"></i> Cliniques</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_contrat.html"><i class="fas fa-file-contract me-2"></i> Contrats</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_soigneur.html"><i class="fas fa-user-md me-2"></i> Soigneurs</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_enclos.html"><i class="fas fa-border-all me-2"></i> Enclos</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-sliders-h me-2"></i> Configuration Seuils</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-database me-2"></i> Statistiques Globales</a></li>
                <li class="nav-item mt-3"><a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Déconnexion</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="col-md-10 main-content">
            <div class="mb-4 pt-3">
                <a href="Gestion_clinique.html" class="text-decoration-none text-muted mb-2 d-inline-block">
                    <i class="fas fa-arrow-left"></i> Retour à la liste
                </a>
                <h2 class="fw-bold">Ajouter une nouvelle clinique</h2>
                <p class="text-muted">Remplissez les informations pour enregistrer une nouvelle clinique cliente.</p>
            </div>

            <div class="card border-0 shadow-sm p-4">
                <form action="#" method="POST">
                    <div class="row">
                        <!-- idC (Souvent en auto-increment en SQL, mais on le met ici en attendant le php) -->
                        <div class="col-md-2 mb-3">
                            <label for="idC" class="form-label fw-bold">idC</label>
                            <input type="text" class="form-control" id="idC" name="idC" placeholder="ID" required>
                        </div>

                        <!-- nomC -->
                        <div class="col-md-10 mb-3">
                            <label for="nomC" class="form-label fw-bold">Nom de la clinique</label>
                            <input type="text" class="form-control" id="nomC" name="nomC" placeholder="Ex: Clinique Soleil" required>
                        </div>
                    </div>

                    <!-- localisation -->
                    <div class="mb-3">
                        <label for="localisation" class="form-label fw-bold">localisation (Adresse complète)</label>
                        <input type="text" class="form-control" id="localisation" name="localisation" placeholder="Numéro, rue, ville, code postal" required>
                    </div>

                    <div class="row">
                        <!-- numTel -->
                        <div class="col-md-6 mb-3">
                            <label for="numTel" class="form-label fw-bold">Téléphone</label>
                            <input type="tel" class="form-control" id="numTel" name="numTel" placeholder="04XXXXXXXX" required>
                        </div>

                        <!-- mail -->
                        <div class="col-md-6 mb-3">
                            <label for="mail" class="form-label fw-bold">Adresse Email</label>
                            <input type="email" class="form-control" id="mail" name="mail" placeholder="contact@clinique.fr" required>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="d-flex justify-content-end gap-2">
                        <a href="Gestion_clinique.html" class="btn btn-outline-secondary px-4">Annuler</a>
                        <!--comme cest en HTML on laisse comme ca 
                        mais lorsquon fera le php un header("Location: Gestion_clinique.html"); pour directement retourner a la liste des clinque-->
                        <button type="submit" class="btn btn-add px-4">Enregistrer la clinique</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>

</body>
</html>
