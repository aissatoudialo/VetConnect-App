<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VetConnect - Modifier Historique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 sidebar shadow">
            <div class="text-center mb-4">
                <h4 class="fw-bold">VetConnect</h4>
                <small>Espace Admin</small>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_clinique.html"><i class="fas fa-hospital me-2"></i> Cliniques</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_contrat.html"><i class="fas fa-file-contract me-2"></i> Contrats</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_soigneur.html"><i class="fas fa-user-md me-2"></i> Soigneurs</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_enclos.html"><i class="fas fa-border-all me-2"></i> Enclos</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-sliders-h me-2"></i> Configuration Seuils</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-database me-2"></i> Statistiques Globales</a></li>
                <li class="nav-item mt-3"><a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Déconnexion</a></li>
            </ul>
        </nav>
        <!-- Main Content -->
        <main class="col-md-10 main-content">
            <div class="mb-3 pt-3">
                <a href="Historique_Enclos.html" class="text-decoration-none text-muted mb-2 d-inline-block">
                    <i class="fas fa-arrow-left"></i> Retour à la liste
                </a>
                <h2 class="fw-bold">Modifier un historique</h2>
                <p class="text-muted">Mettez à jour les informations de l'historique sélectionné.</p>
            </div>
        
            <!-- Contenu principal -->
            <div class="card border-0 shadow-sm p-4">
                <form action="Gestion_enclos.html" method="POST">
                    <div class="row g-2">
                        <!-- idEnclos (Lecture seule comme idC) -->
                        <div class="col-md-2 mb-2">
                            <label for="idAnimal" class="form-label fw-bold">ID animal</label>
                            <input type="text" class="form-control bg-light" id="idAnimal" name="idAnimal" value="1" readonly>
                        </div>
                        <!-- Nom de l'animal -->
                        <div class="col-md-4 mb-2">
                            <label for="nomAnimal" class="form-label fw-bold">Nom de l'animal</label>
                            <input type="text" class="form-control" id="nomAnimal" name="nomAnimal" value="Animal 1">
                        </div>
                        <!-- Date d'entrée -->
                        <div class="col-md-4 mb-2">
                            <label for="dateEntree" class="form-label fw-bold">Date d'entrée</label>
                            <input type="date" class="form-control" id="dateEntree" name="dateEntree" value="2024-01-15">
                        </div>
                        <!-- Date de sortie -->
                        <div class="col-md-4 mb-2">
                            <label for="dateSortie" class="form-label fw-bold">Date de sortie</label>
                            <input type="date" class="form-control" id="dateSortie" name="dateSortie" value="2024-02-15">
                        </div>
                    </div>
                
                    <hr class="my-3">

                    <div class="d-flex justify-content-end gap-2">
                        <a href="Historique_Enclos.html" class="btn btn-outline-secondary px-4">Annuler</a>
                        <button type="submit" class="btn btn-add px-4">Enregistrer les modifications</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
