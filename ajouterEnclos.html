<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VetConnect - Gestion des Enclos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-2 sidebar shadow">
            <div class="text-center mb-4">
                <h4 class="fw-bold">VetConnect</h4>
                <small>Espace Admin</small>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="tableauBord.html"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_clinique.html"><i class="fas fa-hospital me-2"></i> Cliniques</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_contrat.html"><i class="fas fa-file-contract me-2"></i> Contrats</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_soigneur.html"><i class="fas fa-user-md me-2"></i> Soigneurs</a></li>
                <li class="nav-item"><a class="nav-link active" href="Gestion_enclos.html"><i class="fas fa-border-all me-2"></i> Enclos</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-sliders-h me-2"></i> Configuration Seuils</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-database me-2"></i> Statistiques Globales</a></li>
                <li class="nav-item mt-3"><a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Déconnexion</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="col-md-10 main-content">
            <div class="mb-3 pt-3">
                <a href="Gestion_enclos.html" class="text-decoration-none text-muted mb-2 d-inline-block">
                    <i class="fas fa-arrow-left"></i> Retour à la liste
                </a>
                <h2 class="fw-bold">Ajouter un enclos</h2>
                <p class="text-muted">Remplissez les informations pour enregistrer un nouveau enclos.</p>
            </div>

            <div class="card border-0 shadow-sm p-4">
                <form action="#" method="POST">
                    <div class="row">
                        <!-- idE -->
                        <div class="col-md-2 mb-2">
                            <label for="idE" class="form-label fw-bold">idE</label>
                            <input type="text" class="form-control bg-light" id="idE" name="idE" placeholder="AUTO" disabled>
                        </div>
                        <!-- Type d'enclos -->
                        <div class="col-md-5 mb-2">
                            <label for="typeEnclos" class="form-label fw-bold">Type de l'enclos</label>
                            <select class="form-select" id="typeEnclos" name="typeEnclos" required>
                                <option value="">Sélectionner un type</option>
                                <option value="classique">Classique</option>
                                <option value="post_op">Post-opératoire</option>
                                <option value="reanimation">Réanimation</option>
                                <option value="isolement">Isolement</option>
                                <option value="oxygene">Oxygénothérapie</option>
                                <option value="intensifs">Soins intensifs</option>
                                <option value="autre">Autre</option>
                            </select>
                        </div>

                        <div class="col-md-5 mb-2">
                            <label for="idC" class="form-label fw-bold">Dimensions</label>
                            <input type="text" class="form-control" id="dimensions" name="dimensions" placeholder="Ex: 3x4m" required>
                        </div>
                        <div class="col-md-5 mb-2">
                            <label for="idC" class="form-label fw-bold">Statut</label>
                            <select class="form-select" id="statut" name="statut" required>
                                <option value="">Sélectionner un statut</option>
                                <option value="disponible">Disponible</option>
                                <option value="occupé">Occupé</option>
                                <option value="maintenance">Maintenance</option>
                            </select>
                    </div>

                  <hr class="my-4">

                    <div class="d-flex justify-content-end gap-2">
                        <a href="Gestion_enclos.html" class="btn btn-outline-secondary px-4">Annuler</a>
                        <button type="submit" class="btn btn-add px-4">Enregistrer l'enclos</button>
                    </div>
                </form>
            </div>
        </main> 
        </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
