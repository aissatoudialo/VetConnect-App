<!DOCTYPE html> 
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VetConnect - Modifier Soigneur</title>  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-2 sidebar shadow">
            <div class="text-center mb-4">
                <h4 class="fw-bold">VetConnect</h4>
                <small>Espace Admin</small>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="tableauBord.html"><i class="fas fa-home me-2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_clinique.html"><i class="fas fa-hospital me-2"></i> Cliniques</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_contrat.html"><i class="fas fa-file-contract me-2"></i> Contrats</a></li>
                <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-user-md me-2"></i> Soigneurs</a></li>
                <li class="nav-item"><a class="nav-link" href="Gestion_enclos.html"><i class="fas fa-border-all me-2"></i> Enclos</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-sliders-h me-2"></i> Configuration Seuils</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-database me-2"></i> Statistiques Globales</a></li>
                <li class="nav-item mt-3"><a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Déconnexion</a></li>
            </ul>
        </nav>
        <!-- Main Content -->
        <main class="col-md-10 main-content">
            <div class="mb-1 pt-1">
                <a href="Gestion_soigneur.html" class="text-decoration-none text-muted mb-2 d-inline-block">
                    <i class="fas fa-arrow-left"></i> Retour à la liste
                </a>
                <h2 class="fw-bold">Modifier le soigneur</h2>
                <p class="text-muted">Mettez à jour les informations du soigneur sélectionné.</p>
            </div>
            <div class="card border-0 shadow-sm p-4">
                <form action="#" method="POST">
                    <div class="row g-2">
                        <!-- idS (Lecture seule) -->
                        <div class="col-md-2 mb-2">
                            <label for="idS" class="form-label fw-bold">idS</label>
                            <input type="text" class="form-control bg-light" id="idS" name="idS" value="1" readonly>
                        </div>
                        <!-- Nom Soigneur -->
                        <div class="col-md-5 mb-2">
                            <label for="nomSoigneur" class="form-label fw-bold">Nom du soigneur</label>
                            <input type="text" class="form-control" id="nomSoigneur" name="nomSoigneur" value="Doe" required>
                        </div>
                        <!-- Prénom Soigneur -->
                        <div class="col-md-5 mb-2">
                            <label for="prenomSoigneur" class="form-label fw-bold">Prénom du soigneur</label>
                            <input type="text" class="form-control" id="prenomSoigneur" name="prenomSoigneur" value="John" required>
                        </div>
                    </div>
                    <div class="row g-2">
                        <!-- Spécialité Soigneur -->
                        <div class="col-md-5 mb-2">
                            <label for="specialiteSoigneur" class="form-label fw-bold">Spécialité du soigneur</label>
                            <input type="text" class="form-control" id="specialiteSoigneur" name="specialiteSoigneur" value="Chirurgie" required>
                        </div>
                        <!-- Rôle -->
                        <div class="col-md-5 mb-2">
                            <label for="idC" class="form-label fw-bold">Rôle</label>
                            <input type="text" class="form-control" id="roleSoigneur" name="roleSoigneur" value="Soigneur principal" required>
                        </div>
                        <!-- Utilisateur-->
                        <div class="col-md-5 mb-2">
                            <label for="idU" class="form-label fw-bold">Utilisateur</label>
                            <select class="form-select" id="idU" name="idU" >
                                <option value="U1" selected>Utilisateur 1</option>
                                <option value="U2">Utilisateur 2</option>
                            </select>
                        </div>
                        <!-- Clinique associée -->
                        <div class="col-md-5 mb-2">
                            <label for="idC" class="form-label fw-bold">Clinique associée</label>
                            <select class="form-select" id="idC" name="idC" required>
                                <option value="C1" selected>Clinique 1</option>
                                <option value="C2">Clinique 2</option>
                                <option value="C3">Clinique 3</option>
                            </select>
                        </div>
                    </div>
                    <hr class="my-3">
                    <div class="d-flex justify-content-end gap-2">
                        <a href="Gestion_soigneur.html" class="btn btn-outline-secondary px-4">Annuler</a>
                        <button type="submit" class="btn btn-add px-4">Enregistrer les modifications</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
